services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: retriflow-pgvector
    environment:
      POSTGRES_DB: retriflow
      POSTGRES_USER: retriflow
      POSTGRES_PASSWORD: retriflow
    ports:
      - "5433:5432"
    volumes:
      - retriflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retriflow -d retriflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: retriflow-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - retriflow-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.72
    container_name: retriflow-rustfs
    command:
      - "--address"
      - ":9000"
      - "--console-enable"
      - "--access-key"
      - "rustfsadmin"
      - "--secret-key"
      - "rustfsadmin"
      - "/data"
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_CONSOLE_ENABLE=true
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - retriflow-rustfsdata:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:9001/rustfs/console/index.html >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  tika:
    build:
      context: .
      dockerfile: tools/tika/Dockerfile
    container_name: retriflow-tika
    command: ["java", "-jar", "/app/tika-server-standard-3.2.3.jar", "--host", "*", "--port", "9998"]
    ports:
      - "9998:9998"
    restart: unless-stopped

  ocr:
    build:
      context: .
      dockerfile: tools/ocr/Dockerfile
    container_name: retriflow-ocr
    ports:
      - "9889:9889"
    restart: unless-stopped

volumes:
  retriflow-pgdata:
  retriflow-redisdata:
  retriflow-rustfsdata:
